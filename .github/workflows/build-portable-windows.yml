name: Build Portable Windows Artifact

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - app.py
      - pdf_matcher.py
      - requirements.txt
      - pdf_matcher.spec
      - build_portable.bat
      - run.bat
      - frontend/**
      - .github/workflows/build-portable-windows.yml

jobs:
  build-portable:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build portable distribution
        shell: cmd
        run: build_portable.bat

      - name: Archive portable folder
        shell: pwsh
        run: |
          if (!(Test-Path "dist/pdf_matcher")) {
            throw "Portable output folder not found: dist/pdf_matcher"
          }
          Compress-Archive -Path "dist/pdf_matcher" -DestinationPath "dist/pdf_matcher.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: portable-windows-pdf-matcher
          path: dist/pdf_matcher.zip
          if-no-files-found: error
          retention-days: 14
