name: Build Portable Windows Artifact

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - app.py
      - pdf_matcher.py
      - requirements.txt
      - pdf_matcher.spec
      - build_portable.bat
      - run.bat
      - frontend/**
      - .github/workflows/build-portable-windows.yml

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-portable:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Show toolchain versions
        shell: pwsh
        run: |
          Write-Host "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=$env:FORCE_JAVASCRIPT_ACTIONS_TO_NODE24"
          python --version
          node --version
          npm --version

      - name: Build portable distribution
        shell: pwsh
        run: |
          cmd /c build_portable.bat 2>&1 | Tee-Object -FilePath build-portable.log
          if ($LASTEXITCODE -ne 0) {
            throw "build_portable.bat failed with exit code $LASTEXITCODE"
          }

      - name: Archive portable folder
        shell: pwsh
        run: |
          if (!(Test-Path "dist/pdf_matcher")) {
            throw "Portable output folder not found: dist/pdf_matcher"
          }
          Compress-Archive -Path "dist/pdf_matcher" -DestinationPath "dist/pdf_matcher.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: portable-windows-pdf-matcher
          path: dist/pdf_matcher.zip
          if-no-files-found: error
          retention-days: 14

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: build-portable-log
          path: build-portable.log
          if-no-files-found: ignore
          retention-days: 7
